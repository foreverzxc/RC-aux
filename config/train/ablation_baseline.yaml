# Ablation baseline: no direction loss, no scheduled sampling
defaults:
  - rcaux
  - _self_

output_model_name: ablation_baseline

max_samples: 10000

trainer:
  max_epochs: 10

loader:
  batch_size: 64
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  pin_memory: true

wandb:
  enabled: false

loss:
  reachability:
    enabled: false
  rollout:
    curriculum_epochs: 3
    direction_weight: 0.0
    scheduled_sampling:
      enabled: false
